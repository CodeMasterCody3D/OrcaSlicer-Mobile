[printer:FlyingBear Ghost 6 0.4 nozzle]
gcode_flavor = marlin2
printer_technology = FFF
printer_model = FlyingBear Ghost 6
printer_variant = 0.4
extruder_clearance_radius = 55
machine_max_acceleration_extruding = 1500;1500
machine_max_acceleration_retracting = 3000;3000
machine_max_acceleration_x = 1500;1500
machine_max_acceleration_y = 1500;1500
machine_max_acceleration_z = 100;100
machine_max_acceleration_e = 2000;2000
machine_max_feedrate_x = 200;200
machine_max_feedrate_y = 200;200
machine_max_feedrate_z = 4;4
machine_max_feedrate_e = 45;45
machine_min_extruding_rate = 0
machine_min_travel_rate = 0
machine_max_jerk_x = 15;15
machine_max_jerk_y = 15;15
machine_max_jerk_z = 0.4;0.4
machine_max_jerk_e = 2.0;2.0
max_print_height = 210
start_gcode = M220 S100 ;reset feedrate\nM221 S100 ;reset flowrate\nG21 ;set units to millimeters\nG90 ;use absolute coordinates\nM82 ;absolute extrusion mode\nM107 ;turn off colling fan\n\nM140 S[bed_temperature_initial_layer] ;set bed temperature continue without waiting\nM104 S[nozzle_temperature_initial_layer] ;set hotend temperature continue without waiting\n\nG28 ;home\nG1 Z2 F1500 ;raise z\nG92 E0 ;reset extruder\n\nM190 S[bed_temperature_initial_layer] ;wait for bed temperature\nM109 S[nozzle_temperature_initial_layer] ;wait for hotend temperature\n\nG1 X20 Y20 F5000 ;start position \nG1 Z0.28 F1500 ;lower z\nG1 E4 F500 ;prime the filament\n\nG1 X20 Y20.0 Z0.28 F3000.0  ;start position \nG1 X20 Y170.0 Z0.28 F1500.0 E12 ;1st line\nG1 X20.3 F1500\nG1 X20.3 Y20.0 Z0.28 F1500.0 E18 ;2nd line\n\nG92 E0 ;reset extruder\nG1 Z2 F1500 ;raise z\nG92 E0 ;reset extruder\n
end_gcode = G91 ;use relative coordinates\nG1 E-4 F1500 ;retract the filament\nG1 X5 Y5 Z0.2 F5000 ;wipe\nG1 Z5 F1500 ;raise z\nG90 ;use absolute coordinates\nG1 X10 Y210 F5000 ;park print head\n\nM107 ;turn off fan\nM104 S0 ;turn off hotend\nM140 S0 ;turn off heatbed\nM84 ;disable motors
before_layer_gcode = ;BEFORE_LAYER_CHANGE\nG92 E0.0\n;[layer_z]\n\n
layer_gcode = ;AFTER_LAYER_CHANGE\n;[layer_z]
toolchange_gcode = M600
silent_mode = 0
single_extruder_multi_material = 1
bed_shape = 0x0, 255x0, 255x210, 0x210
default_print_profile = 0.20mm Standard @FlyingBear Ghost 6
default_filament_profile = FlyingBear Generic PLA

[printer:FlyingBear Ghost7 0.4 nozzle]
gcode_flavor = klipper
printer_technology = FFF
printer_model = FlyingBear Ghost7
printer_variant = 0.4
extruder_clearance_radius = 55
machine_max_acceleration_extruding = 20000;20000
machine_max_acceleration_retracting = 5000;5000
machine_max_acceleration_x = 20000;20000
machine_max_acceleration_y = 20000;20000
machine_max_acceleration_z = 500;200
machine_max_acceleration_e = 5000;5000
machine_max_feedrate_x = 600;200
machine_max_feedrate_y = 600;200
machine_max_feedrate_z = 20;12
machine_max_feedrate_e = 30;25
machine_min_extruding_rate = 0;0
machine_min_travel_rate = 0;0
machine_max_jerk_x = 9;9
machine_max_jerk_y = 9;9
machine_max_jerk_z = 3;0.4
machine_max_jerk_e = 2.5;2.5
max_print_height = 205
start_gcode = ;v1.0.1-20250822;\n;*****************************\nBED_MESH_CLEAR\nM140 S[bed_temperature_initial_layer_single]\nPRINT_START\n;*************PRINT START*************\nG1 X{first_layer_print_min[0]-1.5} Y{min(first_layer_print_min[1] + 80,print_bed_max[0])} F6000 ;move head to drawing line position\nG1 Z0 F100\nM109 S[nozzle_temperature_initial_layer] ;heat nozzle temp set by user and wait \nM190 S[bed_temperature_initial_layer_single];heat bed temp set by user and wait \nM106 S0 ;close head_nozzle fan\n;BED_MESH_CLEAR                                  \n;BED_MESH_PROFILE LOAD=default   # bedmesh load\nG1 Z2.0 F200 ;Move Z Axis up\n ; ; ; ; ; ; ; ; ; draw line along model\n;G92 E0 ;reset extruder\nG1 E8 F300 ;extrude filament\nG90\nG1 X{first_layer_print_min[0]-1.5} Y{min(first_layer_print_min[1] + 80,print_bed_max[0])} F6000 \nG1 Z0.22 F600\nG1 X{first_layer_print_min[0]-1.5} Y{max(0, first_layer_print_min[1]-1.5)}  F1500 E15\nG1 Z0.22 F600\nG1 X{min(first_layer_print_min[0] + 60,print_bed_max[0])} F1200 E18\n ; ; ; ; ; ; ; ; ;draw line along model end \nG4 P200\nG1 Z2\nG92 E0 ;Reset Extruder\nCLEAR_PAUSE\n\nSET_PRINT_STATS_INFO TOTAL_LAYER=[total_layer_count] ; display layers begin\n;***********model start************\n
end_gcode = PRINT_END
before_layer_gcode = ;BEFORE_LAYER_CHANGE\n;[layer_z]\nG92 E0\nSET_PRINT_STATS_INFO CURRENT_LAYER={layer_num + 1}
layer_gcode = ;AFTER_LAYER_CHANGE\n;[layer_z]\nM117 Layer {layer_num+1}/[total_layer_count] : {filament_settings_id[0]}
toolchange_gcode = 
silent_mode = 0
single_extruder_multi_material = 1
bed_shape = 0x0, 250x0, 250x250, 0x250
default_print_profile = 0.20mm Standard @FlyingBear Ghost7
default_filament_profile = FlyingBear PLA Basic @Ghost7

