silent_mode = 0
single_extruder_multi_material = 0
bed_shape = 0x0, 330x0, 330x330, 0x330
default_print_profile = 0.20mm Standard @iQ TiQ2 P1 - PACF Pro Fiberthree (0.4 Nozzle)
