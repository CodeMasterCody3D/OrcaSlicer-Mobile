[printer:Geeetech A10 M 0.4 nozzle]
gcode_flavor = marlin
printer_technology = FFF
printer_model = Geeetech A10 M
printer_variant = 0.4
extruder_clearance_radius = 65
machine_max_acceleration_extruding = 1000;1000
machine_max_acceleration_retracting = 1000;1000
machine_max_acceleration_x = 500;500
machine_max_acceleration_y = 500;500
machine_max_acceleration_z = 500;500
machine_max_acceleration_e = 5000;5000
machine_max_feedrate_x = 200;200
machine_max_feedrate_y = 200;200
machine_max_feedrate_z = 10;10
machine_max_feedrate_e = 60;60
machine_min_extruding_rate = 0;0
machine_min_travel_rate = 0;0
machine_max_jerk_x = 8;8
machine_max_jerk_y = 8;8
machine_max_jerk_z = 0.4;0.4
machine_max_jerk_e = 5;5
max_print_height = 260
start_gcode = ;Geeetech official wiki homepage for A10M: https://www.geeetech.com/wiki/index.php/Geeetech_A10M_3D_printer \nM104 S[nozzle_temperature_initial_layer] ; set extruder temp\nM140 S[bed_temperature_initial_layer[initial_no_support_extruder]] ; set bed temp\nM190 S[bed_temperature_initial_layer[initial_no_support_extruder]] ; wait for bed temp\nM109 S[nozzle_temperature_initial_layer] ; wait for extruder temp\nM220 S100 ;Reset Feedrate\nM221 S100 ;Reset Flowrate\nG92 E0 ; Reset Extruder\nG28 ; Home all axes\nM107 ;Off Fan\nG1 Z5.0 F3000 ;Move Z Axis up little to prevent scratching of Heat Bed\nG1 X0.1 Y20 Z1.4 F6000 ; Move to start position\nT[initial_no_support_extruder] ; Choose initial filament for the first line\nG1 X0.1 Y80.0 Z1.4 F1000 E25 ; Draw the first line\nG92 E0 ; Reset Extruder\nG1 X0.4 Y80.0 Z1.4 F6000 ; Move to side a little\nG1 X1.4 Y20 Z1.4 F1000 E20 ; Draw the second line\nG92 E0 ; Reset Extruder\nG1 Z2.0 F3000 ; Move Z Axis up little to prevent scratching of Heat Bed\nG1 X5 Y20 Z0.28 F3000.0 ; Move over to prevent blob squish\nG92 E0
end_gcode = {if max_layer_z < printable_height}G1 Z{z_offset+min(max_layer_z+2, printable_height)} F600 ; Move print head up{endif}\nG1 X5 Y{print_bed_max[1]*0.8} F{travel_speed*60} ; present print\n{if max_layer_z < printable_height-10}G1 Z{z_offset+min(max_layer_z+70, printable_height-10)} F600 ; Move print head further up{endif}\n{if max_layer_z < max_print_height*0.6}G1 Z{printable_height*0.6} F600 ; Move print head further up{endif}\nM140 S0 ; turn off heatbed\nM104 S0 ; turn off temperature\nM107 ; turn off fan\nM84 X Y E ; disable motors
before_layer_gcode = ;BEFORE_LAYER_CHANGE\n;[layer_z]\nG92 E0\n
layer_gcode = ;------------------------------------\n;layer No: [layer_num] ———>Print Height: [layer_z] mm\n;------------------------------------
toolchange_gcode = 
silent_mode = 0
single_extruder_multi_material = 1
bed_shape = 0x0, 220x0, 220x220, 0x220
default_print_profile = 0.20mm Standard @Geeetech common
default_filament_profile = Generic PLA @System

