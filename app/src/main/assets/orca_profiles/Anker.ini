[printer:Anker M5 0.2 nozzle]
gcode_flavor = marlin2
printer_technology = FFF
printer_model = Anker M5
printer_variant = 0.2
extruder_clearance_radius = 45
machine_max_acceleration_extruding = 10000
machine_max_acceleration_retracting = 1000
machine_max_acceleration_x = 10000
machine_max_acceleration_y = 10000
machine_max_acceleration_z = 500
machine_max_acceleration_e = 5000
machine_max_feedrate_x = 500
machine_max_feedrate_y = 500
machine_max_feedrate_z = 10
machine_max_feedrate_e = 60
machine_min_extruding_rate = 0
machine_min_travel_rate = 0
machine_max_jerk_x = 8
machine_max_jerk_y = 8
machine_max_jerk_z = 0.4
machine_max_jerk_e = 5
max_print_height = 250
start_gcode = M4899 T3 ; Enable v3 jerk and S-curve acceleration \nM104 S150 ; Set hotend temp to 150 degrees to prevent ooze\nM190 S{first_layer_bed_temperature[0]} ; set and wait for bed temp to stabilize\nM109 S{first_layer_temperature[0]} ; set final nozzle temp to stabilize\nG28 ;Home\n;LAYER_COUNT:{total_layer_count}
end_gcode = M104 S0\nM140 S0\n;Retract the filament\nG92 E1\nG1 E-1 F300\nG28 X0 Y0\nM18
before_layer_gcode = ;BEFORE_LAYER_CHANGE\nG92 E0.0\n;[layer_z]\n\n
layer_gcode = ;AFTER_LAYER_CHANGE\n;[layer_z]
toolchange_gcode = M600
silent_mode = 0
single_extruder_multi_material = 1
bed_shape = 0x0, 235x0, 235x235, 0x235
default_print_profile = 0.10mm Standard 0.2mm nozzle @Anker
default_filament_profile = Anker Generic PLA+

