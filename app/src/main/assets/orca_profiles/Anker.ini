silent_mode = 0
single_extruder_multi_material = 1
nozzle_diameter = 0.2
min_layer_height = 0.08
max_layer_height = 0.16
retract_length = 0.75
retract_lift = 0
retract_speed = 60
deretract_speed = 40
retract_before_travel = 2
retract_layer_change = 1
wipe = 1
retract_before_wipe = 70%
