retract_restart_extra = 0
retract_restart_extra_toolchange = 0
bed_shape = 0x0, 235x0, 235x235, 0x235
default_print_profile = 0.20mm Standard @BIQU B1 (0.4 nozzle)
default_filament_profile = Generic PLA

