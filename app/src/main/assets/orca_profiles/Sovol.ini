[printer:Sovol SV01 0.4 nozzle]
gcode_flavor = marlin
printer_technology = FFF
printer_model = Sovol SV01
printer_variant = 0.4
extruder_clearance_radius = 65
machine_max_acceleration_extruding = 500;500
machine_max_acceleration_retracting = 1000;1000
machine_max_acceleration_x = 500;500
machine_max_acceleration_y = 500;500
machine_max_acceleration_z = 100;100
machine_max_acceleration_e = 5000
machine_max_feedrate_x = 500;500
machine_max_feedrate_y = 500;500
machine_max_feedrate_z = 10;10
machine_max_feedrate_e = 60;60
machine_min_extruding_rate = 0
machine_min_travel_rate = 0
machine_max_jerk_x = 8;8
machine_max_jerk_y = 8;8
machine_max_jerk_z = 0.4;0.4
machine_max_jerk_e = 5;5
max_print_height = 300
start_gcode = G90 ; use absolute coordinates\nM83 ; extruder relative mode\nM140 S[bed_temperature_initial_layer_single] ; set final bed temp\nM104 S150 ; set temporary nozzle temp to prevent oozing during homing\nG4 S10 ; allow partial nozzle warmup\nG28 ; home all axis\nG1 Z50 F240\nG1 X2 Y10 F3000\nM104 S[nozzle_temperature_initial_layer] ; set final nozzle temp\nM190 S[bed_temperature_initial_layer_single] ; wait for bed temp to stabilize\nM109 S[nozzle_temperature_initial_layer] ; wait for nozzle temp to stabilize\nG1 Z0.28 F240\nG92 E0\nG1 Y140 E10 F1500 ; prime the nozzle\nG1 X2.3 F5000\nG92 E0\nG1 Y10 E10 F1200 ; prime the nozzle\nG92 E0
end_gcode = {if max_layer_z < printable_height}G1 Z{z_offset+min(max_layer_z+2, printable_height)} F600 ; Move print head up{endif}\nG1 X5 Y{print_bed_max[1]*0.8} F{travel_speed*60} ; present print\n{if max_layer_z < printable_height-10}G1 Z{z_offset+min(max_layer_z+70, printable_height-10)} F600 ; Move print head further up{endif}\n{if max_layer_z < max_print_height*0.6}G1 Z{printable_height*0.6} F600 ; Move print head further up{endif}\nM140 S0 ; turn off heatbed\nM104 S0 ; turn off temperature\nM107 ; turn off fan\nM84 X Y E ; disable motors
before_layer_gcode = ;BEFORE_LAYER_CHANGE\n;[layer_z]\nG92 E0\n
layer_gcode = ;AFTER_LAYER_CHANGE\n;[layer_z]
toolchange_gcode = M600
silent_mode = 0
single_extruder_multi_material = 1
bed_shape = 0x0, 280x0, 280x240, 0x240
default_print_profile = 0.20mm Standard @Sovol SV01
default_filament_profile = Generic PLA @System

