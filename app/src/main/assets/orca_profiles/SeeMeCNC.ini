machine_max_jerk_y = 15;15
machine_max_jerk_z = 15;15
machine_max_jerk_e = 15;15
max_print_height = 500
start_gcode = ;======= SEEMECNC ARTEMIS START G-CODE =======\nG21              ; Set units to mm\nG90              ; Absolute positioning\nM82              ; Extruder to absolute mode\nG28              ; Home all axes\nG1 Z50 F9000     ; Lift nozzle for safe heating\n; --- SELECT STARTING TOOL ---\nT[initial_tool]  ; Activate the first assigned filament in OrcaSlicer\n; --- PREHEAT ---\nM140 S[first_layer_bed_temperature]  ; Start bed heating\nM104 S[first_layer_temperature]      ; Start nozzle heating\nM190 S[first_layer_bed_temperature]  ; Wait for bed to reach temp\nM109 S[first_layer_temperature]      ; Wait for nozzle to reach temp\n; --- RE-PRIME BOWDEN TUBE ---\nG92 E0\nG1 E160.5 F3000  ; Retract 160mm\nG92 E0\n; --- PURGE LINE (curved arc near front edge, 290mm bed) ---\nG92 E0\nG1 X-50 Y-129.9 Z0.4 F5000   ; Move to arc start (inside 145mm radius)\nG1 Z0.3 F1000                    ; Drop to prime height\nG3 X50 Y-129.9 R139.2 E40 F600  ; Arc purge, 100mm sweep, heavy extrusion\nG1 E38 F4500                     ; Retract 2mm before wipe (Bowden)\nG1 X65 Y-119.9 Z0.2 F6000     ; Wipe move at Z0.2\nG92 E0                           ; Zero extruder before print\n;======= END START G-CODE =======
end_gcode = ;======= SEEMECNC ARTEMIS END G-CODE =======\nM104 S0          ; Turn off hotend\nM140 S0          ; Turn off heated bed\nM107 T0          ; Turn off part cooling fan\nG91              ; Relative positioning\nG1 Z2 E-160 F6000  ; Lift 2mm and retract 160mm\nG92 E0\nG90              ; Absolute positioning\nM203 Z18000      ; Allow fast Z for homing\nG28              ; Home all axes - clears part immediately on a delta\n;======= END G-CODE =======
before_layer_gcode = ;BEFORE_LAYER_CHANGE\n;[layer_z]\n{if layer_num == 1}M104 S[nozzle_temperature] ; Step down from first layer temp to print temp{endif}\nG92 E0\n
layer_gcode = ;AFTER_LAYER_CHANGE\n;[layer_z]
toolchange_gcode = {if layer_num >= 0}\nG92 E0\nG1 E-5 F3000\nG1 E-155 F5000\nT[next_extruder]\n{if layer_num == 0}\nM109 S[first_layer_temperature]\n{else}\nM109 S[nozzle_temperature]\n{endif}\nG1 E160 F5000\nG92 E0\n{endif}
silent_mode = 0
single_extruder_multi_material = 1
bed_shape = 145.0000x0.0000, 144.4482x12.6376, 142.7971x25.1790, 140.0592x37.5288, 136.2554x49.5929, 131.4146x61.2796, 125.5737x72.5000, 118.7770x83.1686, 111.0764x93.2042, 102.5305x102.5305, 93.2042x111.0764, 83.1686x118.7770, 72.5000x125.5737, 61.2796x131.4146, 49.5929x136.2554, 37.5288x140.0592, 25.1790x142.7971, 12.6376x144.4482, 0.0000x145.0000, -12.6376x144.4482, -25.1790x142.7971, -37.5288x140.0592, -49.5929x136.2554, -61.2796x131.4146, -72.5000x125.5737, -83.1686x118.7770, -93.2042x111.0764, -102.5305x102.5305, -111.0764x93.2042, -118.7770x83.1686, -125.5737x72.5000, -131.4146x61.2796, -136.2554x49.5929, -140.0592x37.5288, -142.7971x25.1790, -144.4482x12.6376, -145.0000x0.0000, -144.4482x-12.6376, -142.7971x-25.1790, -140.0592x-37.5288, -136.2554x-49.5929, -131.4146x-61.2796, -125.5737x-72.5000, -118.7770x-83.1686, -111.0764x-93.2042, -102.5305x-102.5305, -93.2042x-111.0764, -83.1686x-118.7770, -72.5000x-125.5737, -61.2796x-131.4146, -49.5929x-136.2554, -37.5288x-140.0592, -25.1790x-142.7971, -12.6376x-144.4482, -0.0000x-145.0000, 12.6376x-144.4482, 25.1790x-142.7971, 37.5288x-140.0592, 49.5929x-136.2554, 61.2796x-131.4146, 72.5000x-125.5737, 83.1686x-118.7770, 93.2042x-111.0764, 102.5305x-102.5305, 111.0764x-93.2042, 118.7770x-83.1686, 125.5737x-72.5000, 131.4146x-61.2796, 136.2554x-49.5929, 140.0592x-37.5288, 142.7971x-25.1790, 144.4482x-12.6376
