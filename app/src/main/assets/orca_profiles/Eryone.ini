[printer:Eryone ER20 0.2 nozzle]
gcode_flavor = marlin2
printer_technology = FFF
printer_model = Eryone ER20
printer_variant = 0.2
machine_max_acceleration_extruding = 500
machine_max_acceleration_retracting = 500
machine_max_acceleration_x = 1500
machine_max_acceleration_y = 1500
machine_max_acceleration_z = 100
machine_max_acceleration_e = 1000
machine_max_feedrate_x = 150
machine_max_feedrate_y = 150
machine_max_feedrate_z = 10
machine_max_feedrate_e = 25
machine_min_extruding_rate = 0
machine_min_travel_rate = 0
machine_max_jerk_x = 12
machine_max_jerk_y = 12
machine_max_jerk_z = 0.4
machine_max_jerk_e = 5
max_print_height = 200
start_gcode = G21 ;Metric values\nG90 ;Absolute positioning\nM82 ;Set extruder to absolute mode\nM107 ;Start with the fan off\nM140 S[bed_temperature_initial_layer] ; set bed temperature\nM190 S[bed_temperature_initial_layer] ; wait for bed to reach target temperature\nG28 ;Homing the hotend\nG29 ;Auto bed leveling detecting\nM104 S[nozzle_temperature_initial_layer] ; set nozzle temperature\nM109 S[nozzle_temperature_initial_layer] ; wait for nozzle to reach target temperature\nG92 E0 ;Reset the extruded length\nG1 F200 E3 ;Extrude 3mm of filament\nG92 E0 ;Reset the extruded length again\nG1 Y2.0 F1200 ;Move y axis to prime\nG1 X150 F6000 ;Move x axis to prime\nG1 Z0.2 F720 ;Move z axis to prime\nG1 X80.0 E8.0 F900 ;Prime line\nG1 X20.0 E10.0 F700 ;Prime line\nG92 E0 ;Reset the extruded length\nG5 ;Enable resume from power failure\nM117 Printing...\n
end_gcode = G91 ;Relative positioning\nG1 Z5 F720 ;Raise Z\nG1 E-5 F300 ;Retract a bit to protect nozzle\nM104 S0 ;Turn off extruder\nM140 S0 ;Turn off bed\nM107 ;Turn off all fans\nG90 ;Absolute positioning\nG1 X200 Y200 F4800 ;Parking the hotend\nM84 X Y E ;All steppers off but left Z\n
before_layer_gcode = ;BEFORE_LAYER_CHANGE\n;[layer_z]\n
layer_gcode = ;AFTER_LAYER_CHANGE\n;[layer_z]
toolchange_gcode = 
silent_mode = 0
single_extruder_multi_material = 0
nozzle_diameter = 0.2
min_layer_height = 0.04
max_layer_height = 0.14
retract_length = 5
retract_lift = 0.4
z_hop_types = Auto Lift
retract_speed = 50
deretract_speed = 30
retract_before_travel = 1
retract_layer_change = 0
retract_lift_above = 0
retract_lift_below = 200
retract_lift_enforce = All Surfaces
wipe = 1
wipe_distance = 1
retract_before_wipe = 0%
retract_restart_extra = 0
retract_restart_extra_toolchange = 0
bed_shape = 0x0, 243x0, 243x220, 0x220
default_print_profile = 0.10mm Standard @Eryone ER20 0.2 nozzle

