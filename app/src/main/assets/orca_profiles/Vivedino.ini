[printer:Troodon 2.0 RRF 0.4 nozzle]
gcode_flavor = reprapfirmware
printer_technology = FFF
printer_model = Troodon 2.0 - RRF
printer_variant = 0.4
extruder_clearance_radius = 65
machine_max_acceleration_extruding = 20000;20000
machine_max_acceleration_retracting = 5000;5000
machine_max_acceleration_x = 20000;20000
machine_max_acceleration_y = 20000;20000
machine_max_acceleration_z = 500;200
machine_max_acceleration_e = 5000;5000
machine_max_feedrate_x = 500;200
machine_max_feedrate_y = 500;200
machine_max_feedrate_z = 12;12
machine_max_feedrate_e = 25;25
machine_min_extruding_rate = 0;0
machine_min_travel_rate = 0;0
machine_max_jerk_x = 9;9
machine_max_jerk_y = 9;9
machine_max_jerk_z = 0.2;0.4
machine_max_jerk_e = 2.5;2.5
max_print_height = 330
start_gcode = ; Prime Filament Sensor for Runout\nM581 P1 T2 S-1 R0\nM950 J1 C"nil" ; Input 1 e0 Filament Sensor \nM591 D0 P2 C"e0stop" S1 ; Filament Runout Sensor\n\nM83  ; extruder relative mode\n\nM140 S[first_layer_bed_temperature] ; set bed temp\nM109 S140 ; Set extruder temp 140C before bed level\nM190 S[first_layer_bed_temperature] ; wait for bed temp\n\n;G28 W\nG32 ; Levels Z Tilt and probes Z=0\nG29 S0 ; mesh bed leveling\nG1 X0 Y0 Z2 F2000\nM109 S[first_layer_temperature] ; wait for extruder temp\n\nG1 X10 Y-7 Z0.3 F1000.0 ; go outside print area\nG92 E0.0\nG1 Z0.2 E8 ; Purge Bubble\nG1 X60.0 E9.0  F1000.0 ; intro line\nG1 X100.0 E12.5  F1000.0 ; intro line\nG92 E0.0
end_gcode = {if max_layer_z < max_print_height}G1 Z{z_offset+min(max_layer_z+1, max_print_height)} F720 ; Move print head up{endif}\nG1 X0 Y200 F3600 ; park\n{if max_layer_z < max_print_height}G1 Z{z_offset+min(max_layer_z+49, max_print_height)} F720 ; Move print head further up{endif}\nM221 S100 ; reset flow\nM900 K0 ; reset LA\nM104 S0 ; turn off temperature\nM140 S0 ; turn off heatbed\nM107 ; turn off fan\nM84 ; disable motors
before_layer_gcode = ;BEFORE_LAYER_CHANGE\n;[layer_z]\nG92 E0\n
layer_gcode = ;AFTER_LAYER_CHANGE\n;[layer_z]
toolchange_gcode = 
silent_mode = 0
single_extruder_multi_material = 1
bed_shape = 0x0, 350x0, 350x350, 0x350
default_print_profile = 0.20mm Standard @MyRRF
default_filament_profile = Generic PLA @System

