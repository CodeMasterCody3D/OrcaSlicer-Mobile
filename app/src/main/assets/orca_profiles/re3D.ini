[printer:re3D Gigabot 4 0.4 nozzle]
gcode_flavor = marlin
printer_technology = FFF
printer_model = re3D Gigabot 4
printer_variant = 0.4
extruder_clearance_radius = 65
machine_max_acceleration_extruding = 10000
machine_max_acceleration_retracting = 1000
machine_max_acceleration_x = 10000
machine_max_acceleration_y = 10000
machine_max_acceleration_z = 500
machine_max_acceleration_e = 5000
machine_max_feedrate_x = 500
machine_max_feedrate_y = 500
machine_max_feedrate_z = 10
machine_max_feedrate_e = 60
machine_min_extruding_rate = 0
machine_min_travel_rate = 0
machine_max_jerk_x = 8
machine_max_jerk_y = 8
machine_max_jerk_z = 0.4
machine_max_jerk_e = 5
max_print_height = 600
start_gcode = M83  ; Use relative extrusion distances\nG28  ; Home all axes\nM140 S{first_layer_bed_temperature[initial_tool]}  ; Start heating bed\nM190 S{first_layer_bed_temperature[initial_tool]}  ; Wait for bed to reach temperature\n\nT{initial_tool}\n\n\n; ---------------------------\n; HEAT THE USED TOOL\n; ---------------------------\n{if is_extruder_used[initial_tool]}\nM104 T{initial_tool} S{first_layer_temperature[initial_tool]}  ; Preheat active extruder to first layer temperature\nM109 T{initial_tool} S{first_layer_temperature[initial_tool]}  ; Wait for active extruder to reach temperature\n{endif}\n\nG1 F18000\nG4 S0\nG92 E0
end_gcode = G92 E0\nTURN_OFF_HEATERS\nG28 X Y\nM18\nM107
before_layer_gcode = ;BEFORE_LAYER_CHANGE\n;[layer_z]\nG92 E0\n
layer_gcode = ;AFTER_LAYER_CHANGE\n;[layer_z]
toolchange_gcode = 
silent_mode = 0
single_extruder_multi_material = 0
nozzle_diameter = 0.4,0.4
min_layer_height = 0.2
max_layer_height = 0.32
retract_length = 1.0,1.0
retract_lift = 0,0
z_hop_types = Normal Lift,Normal Lift
travel_slope = 3,3
retract_speed = 30,30
deretract_speed = 30,30
retract_before_travel = 1,1
retract_layer_change = 1,1
wipe = 1,1
wipe_distance = 1,1
retract_before_wipe = 70%,70%
retract_restart_extra = 0,0
retract_restart_extra_toolchange = -0.08,-0.08
bed_shape = 0x0, 590x0, 590x600, 0x600
default_print_profile = 0.26 Standard
default_filament_profile = re3D PLA

