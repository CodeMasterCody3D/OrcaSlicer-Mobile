machine_max_jerk_e = 5
max_print_height = 600
start_gcode = M83  ; Use relative extrusion distances\nG28  ; Home all axes\nM140 S{first_layer_bed_temperature[initial_tool]}  ; Start heating bed\nM190 S{first_layer_bed_temperature[initial_tool]}  ; Wait for bed to reach temperature\n\nT{initial_tool}\n\n\n; ---------------------------\n; HEAT THE USED TOOL\n; ---------------------------\n{if is_extruder_used[initial_tool]}\nM104 T{initial_tool} S{first_layer_temperature[initial_tool]}  ; Preheat active extruder to first layer temperature\nM109 T{initial_tool} S{first_layer_temperature[initial_tool]}  ; Wait for active extruder to reach temperature\n{endif}\n\nG1 F18000\nG4 S0\nG92 E0
end_gcode = G92 E0\nTURN_OFF_HEATERS\nG28 X Y\nM18\nM107
