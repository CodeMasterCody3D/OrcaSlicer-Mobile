[printer:Anycubic 4Max Pro 2 0.4 nozzle]
gcode_flavor = marlin
printer_technology = FFF
printer_model = Anycubic 4Max Pro 2
printer_variant = 0.4
extruder_clearance_radius = 65
machine_max_acceleration_extruding = 1250;1250
machine_max_acceleration_retracting = 1250;1250
machine_max_acceleration_x = 900;900
machine_max_acceleration_y = 900;900
machine_max_acceleration_z = 100;100
machine_max_acceleration_e = 5000
machine_max_feedrate_x = 200;200
machine_max_feedrate_y = 200;200
machine_max_feedrate_z = 16;16
machine_max_feedrate_e = 120;120
machine_min_extruding_rate = 0
machine_min_travel_rate = 0
machine_max_jerk_x = 6;6
machine_max_jerk_y = 6;6
machine_max_jerk_z = 0.2;0.2
machine_max_jerk_e = 5;5
max_print_height = 190
start_gcode = G21 ; metric values\nG90 ; absolute positioning\nM82 ; set extruder to absolute mode\nM140 S[first_layer_bed_temperature] ; set bed temp\nG28 X0 Y0 ; home X and Y\nG28 Z0 ; home Z\nG1 Z30 F{machine_max_speed_z[0]*60} ; move Z a bit down to not blow on the bed edge while heating\nG1 X10 F3900 ; let some space on x to prevent the filament cooling exhaust from beeing blocked by the servo motor\nM190 S[bed_temperature_initial_layer_single] ; wait for bed temp\nM104 S[nozzle_temperature_initial_layer] ; set extruder temp\nM106 S80 ; turn on fan to prevent air nozzle melt while heating up\nM109 S[nozzle_temperature_initial_layer] ; wait for extruder temp\nM107 ; start with the fan off\nG28 X0 ; goto X home again\nG92 E0 ; zero the extruded length\nG1 Z0.2 F360 ; move plattform upwards\n; extrude material next to the plattform (comment or remove following lines to disable)\nG1 F180 E20 ; extrude some material next to the plattform\nG92 E0 ; zero the extruded length\nG1 E-[retraction_length] F{retraction_speed[0]*60} ; do a filament retract\nG92 E0 ; zero the extruded length again\nG1 X5 F3900 ; move sideways to get rid of that string\nG1 E[retraction_length] F{retraction_speed[0]*60} ; do a filament deretract with retract parameters\nG92 E0 ; zero the extruded length again\n; draw intro line (comment or remove following lines to disable)\nG1 X30 E5 F700 ; draw intro line\nG92 E0 ; zero the extruded length\nG1 E-[retraction_length] F{retraction_speed[0]*60} ; do a filament retract\nG1 X40 Z2.0 ; move away from the introline\nG92 E0 ; zero the extruded length again\nG1 E[retraction_length] F{retraction_speed[0]*60} ; do a filament deretract with retract parameters\n; end of intro line code\nM117 Printing...\nG5
end_gcode = M104 S0 ; turn off extruder heating\nM140 S0 ; turn off bed heating\nM107 ; turn off fans\nG91 ; relative positioning\nG0 Z+0.5 ; move Z up a tiny bit\nG90 ; absolute positioning\nG0 X135 Y105 F{machine_max_speed_x[0]*60} ; move extruder to center position\nG0 Z190.5 F{machine_max_speed_z[0]*60} ; lower the plattform to Z min\nM84 ; steppers off\nG90 ; absolute positioning\n
before_layer_gcode = ;BEFORE_LAYER_CHANGE\n;[layer_z]\nG92 E0\n
layer_gcode = ;AFTER_LAYER_CHANGE\n;[layer_z]
toolchange_gcode = M600
silent_mode = 0
single_extruder_multi_material = 1
bed_shape = 0x0, 270x0, 270x210, 0x210
default_print_profile = 0.20mm Standard @Anycubic 4MaxPro2
default_filament_profile = Anycubic Generic PLA

