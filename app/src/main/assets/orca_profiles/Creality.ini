[printer:Creality CR-10 Max 0.4 nozzle]
gcode_flavor = marlin
printer_technology = FFF
printer_model = Creality CR-10 Max
printer_variant = 0.4
extruder_clearance_radius = 47
machine_max_acceleration_extruding = 500;500
machine_max_acceleration_retracting = 1000;1000
machine_max_acceleration_x = 500;500
machine_max_acceleration_y = 500;500
machine_max_acceleration_z = 500;500
machine_max_acceleration_e = 5000;5000
machine_max_feedrate_x = 500;500
machine_max_feedrate_y = 500;500
machine_max_feedrate_z = 10;10
machine_max_feedrate_e = 60;60
machine_min_extruding_rate = 0;0
machine_min_travel_rate = 0;0
machine_max_jerk_x = 8;8
machine_max_jerk_y = 8;8
machine_max_jerk_z = 0.4;0.4
machine_max_jerk_e = 5;5
max_print_height = 470
start_gcode = G90 ; use absolute coordinates\nM83 ; extruder relative mode\nM140 S[bed_temperature_initial_layer] ; set final bed temp\nM104 S150 ; set temporary nozzle temp to prevent oozing during homing\nG4 S10 ; allow partial nozzle warmup\nG28 ; home all axis\nG1 Z50 F240\nG1 X2 Y10 F3000\nM104 S[nozzle_temperature_initial_layer] ; set final nozzle temp\nM190 S[bed_temperature_initial_layer] ; wait for bed temp to stabilize\nM109 S[nozzle_temperature_initial_layer] ; wait for nozzle temp to stabilize\nG1 Z0.28 F240\nG92 E0\nG1 Y140 E10 F1500 ; prime the nozzle\nG1 X2.3 F5000\nG92 E0\nG1 Y10 E10 F1200 ; prime the nozzle\nG92 E0
end_gcode = {if max_layer_z < printable_height}G1 Z{min(max_layer_z+2, printable_height)} F600 ; Move print head up{endif}\nG1 X5 Y{print_bed_max[1]*0.8} F{travel_speed*60} ; present print\n{if max_layer_z < printable_height-10}G1 Z{min(max_layer_z+70, printable_height-10)} F600 ; Move print head further up{endif}\n{if max_layer_z < printable_height*0.6}G1 Z{printable_height*0.6} F600 ; Move print head further up{endif}\nM140 S0 ; turn off heatbed\nM104 S0 ; turn off temperature\nM107 ; turn off fan\nM84 X Y E ; disable motors
before_layer_gcode = ;BEFORE_LAYER_CHANGE\n;[layer_z]\nG92 E0\n
layer_gcode = 
toolchange_gcode = 
silent_mode = 0
single_extruder_multi_material = 1
bed_shape = 0x0, 450x0, 450x450, 0x450
default_print_profile = 0.20mm Standard @Creality CR10Max
default_filament_profile = Creality Generic PLA

[printer:Creality CR-10 SE 0.2 nozzle]
gcode_flavor = klipper
printer_technology = FFF
printer_model = Creality CR-10 SE
printer_variant = 0.2
extruder_clearance_radius = 65
machine_max_acceleration_extruding = 5000;5000
machine_max_acceleration_retracting = 5000;5000
machine_max_acceleration_x = 8000;8000
machine_max_acceleration_y = 8000;8000
machine_max_acceleration_z = 500;200
machine_max_acceleration_e = 5000;5000
machine_max_feedrate_x = 600;600
machine_max_feedrate_y = 600;600
machine_max_feedrate_z = 30;30
machine_max_feedrate_e = 100;100
machine_min_extruding_rate = 0;0
machine_min_travel_rate = 0;0
machine_max_jerk_x = 10;10
machine_max_jerk_y = 10;10
machine_max_jerk_z = 2;2
machine_max_jerk_e = 2.5;2.5
max_print_height = 265
start_gcode = M220 S100 ;Reset feed rate \nM221 S100 ;Reset flow rate \n\nM140 S[bed_temperature_initial_layer_single] ;Set final bed temp\nG28 ;Home \nG92 E0 ;Reset extruder \nG1 Z2.0 F3000 ;Move Z Axis up \nG1 X10.1 Y20 Z0.28 F5000.0 ;Move to start position \nM190 S[bed_temperature_initial_layer_single] ;Wait for bed temp to stabilize\nM109 S[nozzle_temperature_initial_layer] ;Wait for nozzle temp to stabilize\nG1 X10.1 Y145.0 Z0.28 F1500.0 E15 ;Draw the first line \nG1 X10.4 Y145.0 Z0.28 F5000.0 ;Move to side a little \nG1 X10.4 Y20 Z0.28 F1500.0 E30 ;Draw the second line \nG92 E0 ;Reset extruder \nG1 E-1.0000 F1800 ;Retract a bit \nG1 Z2.0 F3000 ;Move Z Axis up \nG1 E0.0000 F1800
end_gcode = G91 ;Relative positioning \nG1 E-2 F2700 ;Retract a bit \nG1 E-2 Z0.2 F2400 ;Retract and raise Z \nG1 X5 Y5 F3000 ;Wipe out \nG1 Z3 ;Raise Z more \nG90 ;Absolute positioning \nG1 X2 Y218 F3000 ;Present print \nM106 S0 ;Turn-off fan \nM104 S0 ;Turn-off hotend \nM140 S0 ;Turn-off bed \nM84 X Y E ;Disable all steppers but Z
before_layer_gcode = ;BEFORE_LAYER_CHANGE\n;[layer_z]\nG92 E0\n
layer_gcode = 
toolchange_gcode = M600
silent_mode = 0
single_extruder_multi_material = 1
bed_shape = 0x0, 220x0, 220x220, 0x220
default_print_profile = 0.20mm Standard @Creality CR10SE 0.2
default_filament_profile = Creality Generic PLA

