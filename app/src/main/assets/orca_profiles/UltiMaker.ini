[printer_model:UltiMaker 2]
name = UltiMaker 2
variants = 0.4
default_materials = Generic PLA;Generic PETG;Generic ABS;Generic ASA;Generic TPU

[printer:UltiMaker 2 0.4 nozzle]
gcode_flavor = marlin
printer_technology = FFF
printer_model = UltiMaker 2
printer_variant = 0.4
extruder_clearance_radius = 65
machine_max_acceleration_extruding = 1500;1500
machine_max_acceleration_retracting = 1500;1500
machine_max_acceleration_x = 3000;3000
machine_max_acceleration_y = 3000;3000
machine_max_acceleration_z = 500;500
machine_max_acceleration_e = 5000
machine_max_feedrate_x = 500;500
machine_max_feedrate_y = 500;500
machine_max_feedrate_z = 12;12
machine_max_feedrate_e = 120;120
machine_min_extruding_rate = 0
machine_min_travel_rate = 0
machine_max_jerk_x = 20;20
machine_max_jerk_y = 20;20
machine_max_jerk_z = 0.4;0.4
machine_max_jerk_e = 2.5;2.5
max_print_height = 212
start_gcode = ; # # # # # # START Header\nG21; metric values\nG90; absolute positioning\nM82 ; set extruder to absolute mode\nM107; start with the fan off\n\nM140 S[bed_temperature_initial_layer_single]; start bed heating\n\nG28 X0 Y0 Z0; move X/Y/Z to endstops\nG1 X1 Y6 F15000; move X/Y to start position\nG1 Z35 F9000; move Z to start position\n\n; Wait for bed and nozzle temperatures\nM190 S{hot_plate_temp_initial_layer[0] - 5}; wait for bed temperature - 5\nM140 S[bed_temperature_initial_layer_single]; continue bed heating\nM109 S[nozzle_temperature_initial_layer]; wait for nozzle temperature\n\n; Purge and prime\nM83; set extruder to relative mode\nG92 E0; reset extrusion distance\nG0 X0 Y1 F10000\nG1 F150 E20 ; compress the bowden tube\nG1 E-8 F1200\nG0 X30 Y1 F5000\nG0 F1200 Z{initial_layer_print_height/2}; Cut the connection to priming blob\nG0 X100 F10000; disconnect with the prime blob\nG0 X50; Avoid the metal clip holding the Ultimaker glass plate\nG0 Z0.2 F720\nG1 E8 F1200\nG1 X80 E3 F1000; intro line 1\nG1 X110 E4 F1000 ; intro line 2\nG1 X140 F600; drag filament to decompress bowden tube\nG1 X100 F3200; wipe backwards a bit\nG1 X150 F3200; back to where there is no plastic: avoid dragging\nG92 E0; reset extruder reference\nM82; set extruder to absolute mode\n\n; # # # # # # END Header
end_gcode = ; # # # # # # START Footer\nG91; relative coordinates\n;G1 E-1 F1200; retract the filament\nG1 Z+15  X-10 Y-10 E-7  F6000; move Z a bit\n; G1 X-10 Y-10 F6000; move XY a bit\nG1 E-5.5 F300; retract the filament\nG28 X0 Y0; move X/Y to min endstops, so the head is out of the way\nM104 S0; extruder heater off\nM140 S0; heated bed heater off (if you have it)\nM84; disable motors\n; # # # # # # END Footer\n
before_layer_gcode = ;BEFORE_LAYER_CHANGE\n;[layer_z]\nG92 E0\n
layer_gcode = ;AFTER_LAYER_CHANGE\n;[layer_z]
toolchange_gcode = 
silent_mode = 0
single_extruder_multi_material = 1
bed_shape = 0x0, 224x0, 224x225, 0x225
