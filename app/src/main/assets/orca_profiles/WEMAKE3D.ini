[printer:WEMAKE3D PhoenixProV1 0.2mm nozzle]
gcode_flavor = marlin
printer_technology = FFF
printer_model = WEMAKE3D PhoenixProV1
printer_variant = 0.2
extruder_clearance_radius = 65
machine_max_acceleration_extruding = 3000,3000
machine_max_acceleration_retracting = 8000,8000
machine_max_acceleration_x = 3000,3000
machine_max_acceleration_y = 2000,2000
machine_max_acceleration_z = 250,250
machine_max_acceleration_e = 8000,8000
machine_max_feedrate_x = 300,200
machine_max_feedrate_y = 300,200
machine_max_feedrate_z = 40,40
machine_max_feedrate_e = 120,120
machine_min_extruding_rate = 0,0
machine_min_travel_rate = 0,0
machine_max_jerk_x = 9,9
machine_max_jerk_y = 9,9
machine_max_jerk_z = 0.2,0.4
machine_max_jerk_e = 2.5,2.5
max_print_height = 400
start_gcode = G90 ; use absolute coordinates\nM83 ; extruder relative mode\nM204 S[machine_max_acceleration_extruding] T[machine_max_acceleration_retracting]\nM104 S[first_layer_temperature] ; set extruder temp\nM140 S[first_layer_bed_temperature] ; set bed temp\nG28 ; home all\nG34; Align Z\nG29; UBL\n\nG1 Y1.0 Z0.3 F1000 ; move print head up\nM190 S[first_layer_bed_temperature] ; wait for bed temp\nM109 S[first_layer_temperature] ; wait for extruder temp\nG92 E0.0\n; initial load\nG1 X205.0 E19 F1000\nG1 Y1.6\nG1 X5.0 E19 F1000\nG92 E0.0\n; intro line\nG1 Y2.0 Z0.2 F1000\nG1 X65.0 E9.0 F1000\nG1 X105.0 E12.5 F1000\nG92 E0.0
end_gcode = ;PRINT_END\nG91 ;Relative positionning\nG1 E-2 F2700 ;Retract a bit\nG1 E-8 X5 Y5 Z3 F3000 ;Retract\nG90 ;Absolute positionning\nG1 X10 Y300 F6000;Finish print\nM106 S0 ;Turn-off fan\nM104 S0 ;Turn-off hotend\nM140 S0 ;Turn-off bed\nM84
before_layer_gcode = ;BEFORE_LAYER_CHANGE\n;[layer_z]\nG92 E0\n
layer_gcode = 
toolchange_gcode = 
silent_mode = 0
single_extruder_multi_material = 1
nozzle_diameter = 0.2
min_layer_height = 0.04
max_layer_height = 0.16
retract_length = 5
retract_lift = 0.4
retract_speed = 60
deretract_speed = 40
retract_before_travel = 1
retract_layer_change = 1
wipe = 1
retract_before_wipe = 70%
retract_restart_extra = 0
retract_restart_extra_toolchange = 0
bed_shape = 0x0, 300x0, 300x300, 0x300

