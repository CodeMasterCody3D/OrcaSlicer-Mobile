[printer:CoLiDo 160 V2 0.4 nozzle]
gcode_flavor = marlin2
printer_technology = FFF
printer_model = CoLiDo 160 V2
printer_variant = 0.4
extruder_clearance_radius = 65
machine_max_acceleration_extruding = 1000
machine_max_acceleration_retracting = 1000
machine_max_acceleration_x = 1000
machine_max_acceleration_y = 1000
machine_max_acceleration_z = 500
machine_max_acceleration_e = 5000
machine_max_feedrate_x = 300
machine_max_feedrate_y = 300
machine_max_feedrate_z = 10
machine_max_feedrate_e = 60
machine_min_extruding_rate = 0
machine_min_travel_rate = 0
machine_max_jerk_x = 8
machine_max_jerk_y = 8
machine_max_jerk_z = 0.4
machine_max_jerk_e = 5
max_print_height = 180
start_gcode = G90 ; use absolute coordinates\nM83 ; extruder relative mode\nM204 S[machine_max_acceleration_extruding] T[machine_max_acceleration_retracting]\nM104 S[first_layer_temperature] ; set extruder temp\nM140 S[first_layer_bed_temperature] ; set bed temp\nG28 ; home all\nG1 X3.0 Y3.0 Z0.3 F1000 ; move print head up\nM190 S[first_layer_bed_temperature] ; wait for bed temp\nM109 S[first_layer_temperature] ; wait for extruder temp\nG92 E0.0\n; initial load\nG1 E2 F300\nG1 Y153.0 E10.2 F1000\nG1 X4 E0.05 F1000\nG0 Y152.5\nG1 E0.2\nG1 X3.5 E0.05\nG1 Y3 E10.2 F1000\nG92 E0.0
end_gcode = G1 E-1.0 F2100 ; retract\nG92 E0.0\nG1{if max_layer_z < max_print_height} Z{z_offset+min(max_layer_z+30, max_print_height)}{endif} E-3.0 F720 ; move print head up & retract filament\nG4 ; wait\nM104 S0 ; turn off temperature\nM140 S0 ; turn off heatbed\nM107 ; turn off fan\nG1 X0 Y0 F3000 ; park print head\nM84 ; disable motors
before_layer_gcode = ;BEFORE_LAYER_CHANGE\n;[layer_z]\nG92 E0\n
layer_gcode = ;AFTER_LAYER_CHANGE\n;[layer_z]
toolchange_gcode = 
silent_mode = 0
single_extruder_multi_material = 1
bed_shape = 0x0, 160x0, 160x160, 0x160
default_print_profile = 0.20mm Standard @CoLiDo X16
default_filament_profile = CoLiDo Generic PLA @CoLiDo X16

