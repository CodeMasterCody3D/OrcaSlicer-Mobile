machine_max_jerk_e = 5
max_print_height = 180
start_gcode = G90 ; use absolute coordinates\nM83 ; extruder relative mode\nM204 S[machine_max_acceleration_extruding] T[machine_max_acceleration_retracting]\nM104 S[first_layer_temperature] ; set extruder temp\nM140 S[first_layer_bed_temperature] ; set bed temp\nG28 ; home all\nG1 X3.0 Y3.0 Z0.3 F1000 ; move print head up\nM190 S[first_layer_bed_temperature] ; wait for bed temp\nM109 S[first_layer_temperature] ; wait for extruder temp\nG92 E0.0\n; initial load\nG1 E2 F300\nG1 Y153.0 E10.2 F1000\nG1 X4 E0.05 F1000\nG0 Y152.5\nG1 E0.2\nG1 X3.5 E0.05\nG1 Y3 E10.2 F1000\nG92 E0.0
