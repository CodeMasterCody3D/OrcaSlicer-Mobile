retract_before_travel = 1,1,1,1
retract_layer_change = 1,1,1,1
retract_lift_above = 0,0,0,0
retract_lift_below = 254,254,254,254
wipe = 1,1,1,1
wipe_distance = 2,2,2,2
retract_before_wipe = 0%,0%,0%,0%
retract_restart_extra = 0,0,0,0
